<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中一數學挑戰賽：多項式大冒險</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: bold;
            color: #34495e;
        }
        .question-box {
            background-color: #eef2f7;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.4em;
            margin-bottom: 20px;
            color: #2980b9;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #3498db;
            background-color: white;
            color: #3498db;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #3498db;
            color: white;
        }
        .feedback {
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 15px;
            height: 30px;
        }
        .correct { color: #2ecc71; }
        .wrong { color: #e74c3c; }
        .hidden { display: none; }
        .start-btn, .restart-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2em;
            border-radius: 5px;
        }
        .start-btn:hover, .restart-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>多項式大冒險 🚀</h1>
    <p id="game-desc">挑戰多項式加減與展開，成為數學大師吧！</p>
    
    <div id="start-screen">
        <button class="start-btn" onclick="startGame()">開始遊戲</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="stats">
            <div>關卡: <span id="level">1</span>/3 (<span id="level-name">加法</span>)</div>
            <div>分數: <span id="score">0</span></div>
            <div>時間: <span id="timer">15</span>秒</div>
        </div>
        
        <div class="question-box" id="question">題目載入中...</div>
        
        <div class="options-container" id="options">
            </div>
        
        <div class="feedback" id="feedback"></div>
    </div>

    <div id="end-screen" class="hidden">
        <h2>遊戲結束！🎉</h2>
        <p style="font-size: 1.3em;">你的最終得分是：<span id="final-score" style="color:#e67e22; font-weight:bold;">0</span> 分</p>
        <button class="restart-btn" onclick="startGame()">再玩一次</button>
    </div>
</div>

<script>
// 遊戲狀態變數
let score = 0;
let currentLevel = 1; 
let questionCount = 0;
const maxQuestionsPerLevel = 3; // 每關玩3題，共9題
let timer;
let timeLeft = 15;
let currentAnswer = "";

// 隨機整數生成器 (避免出 0)
function getRandomInt(min, max) {
    let num = Math.floor(Math.random() * (max - min + 1)) + min;
    return num === 0 ? 1 : num;
}

// 格式化單項式 (處理正負號與1的隱藏)
function formatTerm(coef, varPart, isFirst = false) {
    if (coef === 0) return "";
    let sign = coef > 0 ? (isFirst ? "" : " + ") : (isFirst ? "-" : " - ");
    let absCoef = Math.abs(coef);
    let coefStr = absCoef === 1 && varPart !== "" ? "" : absCoef;
    return sign + coefStr + varPart;
}

// 生成題目
function generateQuestion() {
    feedback.innerHTML = "";
    questionCount++;
    
    // 超過每關題數，晉級
    if (questionCount > maxQuestionsPerLevel) {
        currentLevel++;
        questionCount = 1;
    }
    
    // 3關都過，結束遊戲
    if (currentLevel > 3) {
        endGame();
        return;
    }
    
    // 更新介面顯示
    document.getElementById("level").innerText = currentLevel;
    let levelNames = ["多項式加法", "多項式減法", "多項式展開"];
    document.getElementById("level-name").innerText = levelNames[currentLevel - 1];
    
    let qText = "";
    let correctAnswer = "";
    let wrongAnswers = [];
    
    // 隨機係數
    let a1 = getRandomInt(-5, 5), b1 = getRandomInt(-5, 5);
    let a2 = getRandomInt(-5, 5), b2 = getRandomInt(-5, 5);
    
    if (currentLevel === 1) {
        // 關卡 1: 加法 (a1*x + b1) + (a2*x + b2)
        let p1 = `(${formatTerm(a1, "x", true)}${formatTerm(b1, "")})`;
        let p2 = `(${formatTerm(a2, "x", true)}${formatTerm(b2, "")})`;
        qText = `${p1} + ${p2}`;
        
        let ansA = a1 + a2;
        let ansB = b1 + b2;
        correctAnswer = (formatTerm(ansA, "x", true) + formatTerm(ansB, "")).trim() || "0";
        
        // 製作干擾項
        wrongAnswers = [
            (formatTerm(a1 - a2, "x", true) + formatTerm(b1 - b2, "")).trim() || "0", // 變減法
            (formatTerm(ansA, "x", true) + formatTerm(b1 - b2, "")).trim() || "0",
            (formatTerm(a1 + b1 + a2 + b2, "x", true)).trim() || "0" // 亂加
        ];
        
    } else if (currentLevel === 2) {
        // 關卡 2: 減法 (a1*x + b1) - (a2*x + b2)
        let p1 = `(${formatTerm(a1, "x", true)}${formatTerm(b1, "")})`;
        let p2 = `(${formatTerm(a2, "x", true)}${formatTerm(b2, "")})`;
        qText = `${p1} - ${p2}`;
        
        let ansA = a1 - a2;
        let ansB = b1 - b2;
        correctAnswer = (formatTerm(ansA, "x", true) + formatTerm(ansB, "")).trim() || "0";
        
        wrongAnswers = [
            (formatTerm(a1 + a2, "x", true) + formatTerm(b1 + b2, "")).trim() || "0", // 變加法
            (formatTerm(ansA, "x", true) + formatTerm(b1 + b2, "")).trim() || "0", // 忘記負負得正
            (formatTerm(a1 - a2, "x", true) + formatTerm(b1 + b2, "")).trim() || "0"
        ];
        
    } else if (currentLevel === 3) {
        // 關卡 3: 展開 a1 * (a2*x + b2)
        let k = getRandomInt(-4, 4);
        qText = `${formatTerm(k, "", true)}(${formatTerm(a2, "x", true)}${formatTerm(b2, "")})`;
        
        let ansA = k * a2;
        let ansB = k * b2;
        correctAnswer = (formatTerm(ansA, "x", true) + formatTerm(ansB, "")).trim() || "0";
        
        wrongAnswers = [
            (formatTerm(ansA, "x", true) + formatTerm(b2, "")).trim() || "0", // 後面忘記乘
            (formatTerm(a2, "x", true) + formatTerm(ansB, "")).trim() || "0", // 前面忘記乘
            (formatTerm(ansA + ansB, "x", true)).trim() || "0"
        ];
    }
    
    // 如果正確答案開頭沒符號，補齊（若是空字串代表0）
    if(correctAnswer === "") correctAnswer = "0";
    
    currentAnswer = correctAnswer;
    document.getElementById("question").innerText = qText + " = ?";
    
    // 混合答案順序
    let allOptions = [correctAnswer, ...new Set(wrongAnswers)];
    // 確保一定有4個選項
    while(allOptions.length < 4) {
        allOptions.push(getRandomInt(-10, 10) + "x" + formatTerm(getRandomInt(-10, 10), ""));
    }
    allOptions.sort(() => Math.random() - 0.5);
    
    // 渲染按鈕
    let optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";
    allOptions.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        optionsContainer.appendChild(btn);
    });
    
    // 重設倒數計時
    resetTimer();
}

// 檢查答案
function checkAnswer(selected) {
    clearInterval(timer);
    let feedback = document.getElementById("feedback");
    
    if (selected === currentAnswer) {
        feedback.innerHTML = "<span class='correct'>正解！🎉 +10 分</span>";
        score += 10;
        document.getElementById("score").innerText = score;
    } else {
        feedback.innerHTML = `<span class='wrong'>答錯了 ❌ 正確答案是: ${currentAnswer}</span>`;
    }
    
    // 鎖定按鈕防止連點
    let buttons = document.querySelectorAll("#options button");
    buttons.forEach(b => b.disabled = true);
    
    // 1.5秒後進入下一題
    setTimeout(generateQuestion, 1500);
}

// 計時器功能
function resetTimer() {
    clearInterval(timer);
    timeLeft = 15;
    document.getElementById("timer").innerText = timeLeft;
    
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            document.getElementById("feedback").innerHTML = `<span class='wrong'>時間到！⏱️ 正確答案是: ${currentAnswer}</span>`;
            setTimeout(generateQuestion, 1800);
        }
    }, 1000);
}

// 開始遊戲
function startGame() {
    score = 0;
    currentLevel = 1;
    questionCount = 0;
    document.getElementById("score").innerText = score;
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("end-screen").classList.add("hidden");
    document.getElementById("game-screen").classList.remove("hidden");
    generateQuestion();
}

// 結束遊戲
function endGame() {
    clearInterval(timer);
    document.getElementById("game-screen").classList.add("hidden");
    document.getElementById("end-screen").classList.remove("hidden");
    document.getElementById("final-score").innerText = score;
}
</script>

</body>
</html>
